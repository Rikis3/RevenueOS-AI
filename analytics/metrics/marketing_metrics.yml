version: 2

models:
  - name: gold_marketing_efficiency
    description: "Core metrics for the VP of Marketing to measure top-of-funnel performance and efficiency."
    columns:
      - name: campaign_id
        description: "Foreign key to dim_campaigns"
      - name: leads_generated
        description: "Total number of raw leads generated by the campaign."
      - name: mqls_generated
        description: "Total number of leads that passed the qualification threshold."
      - name: cost_per_lead
        description: "Campaign budget divided by leads generated."
      - name: cost_per_mql
        description: "Campaign budget divided by MQLs generated."

  - name: gold_attribution_roi
    description: "Multi-touch attribution model tying marketing spend to closed-won revenue."
    columns:
      - name: campaign_id
        description: "Foreign key to dim_campaigns"
      - name: first_touch_revenue
        description: "ARR credited to the campaign under First-Touch attribution."
      - name: last_touch_revenue
        description: "ARR credited to the campaign under Last-Touch attribution."
      - name: multi_touch_revenue
        description: "ARR credited to the campaign under a W-Shaped attribution model."
      - name: roas
        description: "Return on Ad Spend: (multi_touch_revenue - budget) / budget"
